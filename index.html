<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Epic GO">
    <meta name="theme-color" content="#0b0e2a">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon-192.png">
    <title>Epic Universe - Guia de Atracciones</title>
    <!-- Leaflet.js for map -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Poppins:wght@400;600;700;900&display=swap" rel="stylesheet">
</head>
<body>
    <div id="app">
        <!-- Header -->
        <header class="header">
            <div class="header-logo">
                <span class="logo-icon">&#9883;</span>
                <div>
                    <h1>EPIC UNIVERSE</h1>
                    <p class="subtitle">Guia Inteligente de Atracciones</p>
                </div>
            </div>
            <div class="park-selector">
                <button class="park-btn" data-park="islands">
                    <span class="park-icon">&#127965;</span> Islands
                </button>
                <button class="park-btn" data-park="studios">
                    <span class="park-icon">&#127916;</span> Studios
                </button>
                <button class="park-btn active" data-park="epicuniverse">
                    <span class="park-icon">&#9883;</span> Epic
                </button>
            </div>
        </header>

        <!-- Worlds Filter (Epic Universe Lands) -->
        <div class="worlds-bar" id="worlds-bar">
            <button class="world-chip active" data-world="all">
                <span>&#127760;</span> Todos
            </button>
            <button class="world-chip" data-world="Celestial Park">
                <span>&#10024;</span> Celestial
            </button>
            <button class="world-chip" data-world="Super Nintendo World">
                <span>&#127918;</span> Nintendo
            </button>
            <button class="world-chip" data-world="Dark Universe">
                <span>&#128123;</span> Dark
            </button>
            <button class="world-chip" data-world="The Wizarding World">
                <span>&#9889;</span> Potter
            </button>
            <button class="world-chip" data-world="How to Train Your Dragon">
                <span>&#128009;</span> Dragon
            </button>
        </div>

        <!-- Map Toggle Button -->
        <div class="map-toggle-bar">
            <button class="map-toggle-btn" id="map-toggle-btn" onclick="toggleMap()">
                &#128506; Mapa
            </button>
        </div>

        <!-- Map Section (hidden by default) -->
        <section class="map-section" id="map-section" style="display:none">
            <div id="map-container"></div>
            <button class="map-center-btn" onclick="centerOnUser()">&#127919;</button>
            <!-- Navigation Panel -->
            <div class="nav-panel" id="nav-panel" style="display:none">
                <div class="nav-info">
                    <div class="nav-ride-name" id="nav-ride-name">---</div>
                    <div class="nav-ride-area" id="nav-ride-area">---</div>
                    <div class="nav-walk-time" id="nav-walk-time">---</div>
                </div>
                <div class="nav-wait-box">
                    <span class="nav-wait" id="nav-ride-wait">--</span>
                    <span class="nav-wait-label">espera</span>
                </div>
            </div>
        </section>

        <!-- Recommendation Banner -->
        <section class="recommendation" id="recommendation">
            <div class="rec-icon">&#128640;</div>
            <div class="rec-text">
                <span class="rec-label">SIGUIENTE ATRACCION RECOMENDADA</span>
                <h2 id="rec-name">Cargando...</h2>
                <div class="rec-details">
                    <span class="rec-wait" id="rec-wait">-- min</span>
                    <span class="rec-area" id="rec-area"></span>
                </div>
            </div>
            <button class="rec-go-btn" id="rec-go-btn">IR AHORA</button>
        </section>

        <!-- Stats Bar -->
        <div class="stats-bar">
            <div class="stat">
                <span class="stat-number" id="stat-done">0</span>
                <span class="stat-label">Hechas</span>
            </div>
            <div class="stat">
                <span class="stat-number" id="stat-remaining">0</span>
                <span class="stat-label">Restantes</span>
            </div>
            <div class="stat">
                <span class="stat-number" id="stat-avg-wait">0</span>
                <span class="stat-label">Espera Prom.</span>
            </div>
            <div class="stat-progress">
                <div class="progress-bar">
                    <div class="progress-fill" id="progress-fill"></div>
                </div>
            </div>
        </div>

        <!-- Filter Tabs -->
        <div class="filter-tabs">
            <button class="filter-btn active" data-filter="all">Todas</button>
            <button class="filter-btn" data-filter="pending">Pendientes</button>
            <button class="filter-btn" data-filter="done">Completadas</button>
        </div>

        <!-- Sort Controls -->
        <div class="sort-controls">
            <span class="sort-label">Ordenar:</span>
            <button class="sort-btn active" data-sort="wait">Menor Espera</button>
            <button class="sort-btn" data-sort="name">Nombre</button>
            <button class="sort-btn" data-sort="area">Mundo</button>
        </div>

        <!-- Attractions List -->
        <div class="attractions-list" id="attractions-list">
            <!-- Populated by JS -->
        </div>

        <!-- Refresh Timer -->
        <div class="refresh-bar" id="refresh-bar">
            <span>Actualizacion en <strong id="refresh-countdown">60</strong>s</span>
            <button class="refresh-btn" id="refresh-btn">&#8635; Actualizar</button>
        </div>

        <!-- Notification Toast -->
        <div class="toast" id="toast">
            <span id="toast-msg"></span>
        </div>

        <!-- Attribution -->
        <div class="attribution">
            Powered by <a href="https://queue-times.com/en-US" target="_blank" rel="noopener">Queue-Times.com</a>
        </div>
    </div>

    <script src="app.js"></script>
    <script src="map.js"></script>
</body>
</html>
