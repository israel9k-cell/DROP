<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#1a0a00">
    <title>TimeLens - Camara del Pasado</title>
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon-192.png">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Splash Screen -->
    <div id="splash" class="splash">
        <div class="splash-content">
            <div class="lens-icon">
                <svg viewBox="0 0 120 120" width="120" height="120">
                    <circle cx="60" cy="60" r="55" fill="none" stroke="#c8a050" stroke-width="3"/>
                    <circle cx="60" cy="60" r="38" fill="none" stroke="#c8a050" stroke-width="2" opacity="0.6"/>
                    <circle cx="60" cy="60" r="22" fill="#c8a05020" stroke="#c8a050" stroke-width="1.5"/>
                    <circle cx="60" cy="60" r="8" fill="#c8a050" opacity="0.4"/>
                    <line x1="60" y1="2" x2="60" y2="18" stroke="#c8a050" stroke-width="1.5" opacity="0.4"/>
                    <line x1="60" y1="102" x2="60" y2="118" stroke="#c8a050" stroke-width="1.5" opacity="0.4"/>
                    <line x1="2" y1="60" x2="18" y2="60" stroke="#c8a050" stroke-width="1.5" opacity="0.4"/>
                    <line x1="102" y1="60" x2="118" y2="60" stroke="#c8a050" stroke-width="1.5" opacity="0.4"/>
                </svg>
            </div>
            <h1>TimeLens</h1>
            <p>Camara del Pasado</p>
            <div class="loading-bar"><div class="loading-fill"></div></div>
        </div>
    </div>

    <!-- Main App -->
    <div id="app" class="app hidden">

        <!-- ===== CAMERA VIEW ===== -->
        <div id="camera-view" class="camera-view">
            <video id="camera-feed" autoplay playsinline muted></video>
            <canvas id="preview-canvas" class="hidden"></canvas>

            <!-- Top Bar -->
            <div class="top-bar">
                <button id="btn-flash" class="top-icon-btn" title="Flash">
                    <svg viewBox="0 0 24 24" width="28" height="28" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
                        <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/>
                    </svg>
                </button>
                <button id="btn-era" class="era-btn">
                    <span id="era-label">1920s</span>
                    <svg viewBox="0 0 12 12" width="10" height="10" fill="currentColor"><path d="M2 4l4 5 4-5z"/></svg>
                </button>
                <button id="btn-switch-cam" class="top-icon-btn" title="Cambiar camara">
                    <svg viewBox="0 0 24 24" width="28" height="28" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
                        <path d="M23 19a2 2 0 01-2 2H3a2 2 0 01-2-2V8a2 2 0 012-2h4l2-3h6l2 3h4a2 2 0 012 2z"/>
                        <circle cx="12" cy="13" r="4"/>
                    </svg>
                </button>
            </div>

            <!-- Era Picker Dropdown -->
            <div id="era-picker" class="era-picker hidden">
                <div class="era-option selected" data-era="1850">
                    <div class="era-icon-wrap"><span>&#x1F3A9;</span></div>
                    <div class="era-info">
                        <div class="era-name">1850s</div>
                        <div class="era-desc">Daguerrotipo</div>
                    </div>
                </div>
                <div class="era-option" data-era="1900">
                    <div class="era-icon-wrap"><span>&#x1F682;</span></div>
                    <div class="era-info">
                        <div class="era-name">1900s</div>
                        <div class="era-desc">Sepia clasico</div>
                    </div>
                </div>
                <div class="era-option" data-era="1920">
                    <div class="era-icon-wrap"><span>&#x1F3AD;</span></div>
                    <div class="era-info">
                        <div class="era-name">1920s</div>
                        <div class="era-desc">Cine mudo</div>
                    </div>
                </div>
                <div class="era-option" data-era="1950">
                    <div class="era-icon-wrap"><span>&#x1F697;</span></div>
                    <div class="era-info">
                        <div class="era-name">1950s</div>
                        <div class="era-desc">Blanco y negro</div>
                    </div>
                </div>
                <div class="era-option" data-era="1970">
                    <div class="era-icon-wrap"><span>&#x270C;&#xFE0F;</span></div>
                    <div class="era-info">
                        <div class="era-name">1970s</div>
                        <div class="era-desc">Polaroid retro</div>
                    </div>
                </div>
                <div class="era-option" data-era="1990">
                    <div class="era-icon-wrap"><span>&#x1F4FC;</span></div>
                    <div class="era-info">
                        <div class="era-name">1990s</div>
                        <div class="era-desc">Camara desechable</div>
                    </div>
                </div>
            </div>

            <!-- Bottom Controls -->
            <div class="bottom-bar">
                <button id="btn-gallery" class="bottom-action" title="Galeria">
                    <div id="gallery-thumb" class="gallery-thumb-img"></div>
                    <svg class="gallery-placeholder" viewBox="0 0 24 24" width="30" height="30" fill="none" stroke="currentColor" stroke-width="1.5">
                        <rect x="3" y="3" width="18" height="18" rx="2"/>
                        <circle cx="8.5" cy="8.5" r="1.5"/>
                        <path d="M21 15l-5-5L5 21"/>
                    </svg>
                    <span class="bottom-label">Galeria</span>
                </button>

                <button id="btn-capture" class="capture-btn">
                    <div class="capture-ring">
                        <div class="capture-inner"></div>
                    </div>
                </button>

                <button id="btn-upload" class="bottom-action" title="Enviar foto">
                    <svg viewBox="0 0 24 24" width="30" height="30" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
                        <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/>
                        <polyline points="17 8 12 3 7 8"/>
                        <line x1="12" y1="3" x2="12" y2="15"/>
                    </svg>
                    <span class="bottom-label">Enviar</span>
                </button>
                <input type="file" id="file-input" accept="image/*" class="hidden">
            </div>
        </div>

        <!-- ===== RESULT VIEW ===== -->
        <div id="result-view" class="result-view hidden">
            <div class="result-header">
                <button id="btn-back" class="header-btn">
                    <svg viewBox="0 0 24 24" width="26" height="26" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
                </button>
                <span class="result-title">Foto del Pasado</span>
                <button id="btn-save" class="header-btn">
                    <svg viewBox="0 0 24 24" width="26" height="26" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
                        <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/>
                        <polyline points="7 10 12 15 17 10"/>
                        <line x1="12" y1="15" x2="12" y2="3"/>
                    </svg>
                </button>
            </div>
            <div class="result-container">
                <canvas id="result-canvas"></canvas>
                <div id="date-stamp" class="date-stamp"></div>
            </div>
            <div class="result-actions">
                <button id="btn-share" class="action-btn primary">
                    <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
                        <circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/>
                        <line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/>
                        <line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/>
                    </svg>
                    <span>Compartir</span>
                </button>
                <button id="btn-send-edit" class="action-btn accent">
                    <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
                        <line x1="22" y1="2" x2="11" y2="13"/>
                        <polygon points="22 2 15 22 11 13 2 9 22 2"/>
                    </svg>
                    <span>Enviar</span>
                </button>
                <button id="btn-retake" class="action-btn secondary">
                    <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
                        <path d="M23 19a2 2 0 01-2 2H3a2 2 0 01-2-2V8a2 2 0 012-2h4l2-3h6l2 3h4a2 2 0 012 2z"/>
                        <circle cx="12" cy="13" r="4"/>
                    </svg>
                    <span>Nueva</span>
                </button>
            </div>
        </div>

        <!-- ===== GALLERY VIEW ===== -->
        <div id="gallery-view" class="gallery-view hidden">
            <div class="gallery-header">
                <button id="btn-gallery-back" class="header-btn">
                    <svg viewBox="0 0 24 24" width="26" height="26" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
                </button>
                <span class="gallery-title">Mi Coleccion</span>
                <button id="btn-clear-gallery" class="header-btn">
                    <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
                        <polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/>
                    </svg>
                </button>
            </div>
            <div id="gallery-grid" class="gallery-grid"></div>
            <div id="gallery-empty" class="gallery-empty hidden">
                <svg viewBox="0 0 24 24" width="64" height="64" fill="none" stroke="currentColor" stroke-width="1" opacity="0.35" stroke-linecap="round">
                    <path d="M23 19a2 2 0 01-2 2H3a2 2 0 01-2-2V8a2 2 0 012-2h4l2-3h6l2 3h4a2 2 0 012 2z"/>
                    <circle cx="12" cy="13" r="4"/>
                </svg>
                <p>Aun no has tomado fotos</p>
            </div>
        </div>

        <!-- ===== SEND MODAL ===== -->
        <div id="send-modal" class="modal-overlay hidden">
            <div class="modal-card">
                <div class="modal-header">
                    <span class="modal-title">Enviar foto</span>
                    <button id="btn-close-modal" class="modal-close">
                        <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                    </button>
                </div>
                <div class="send-options">
                    <button class="send-option" data-action="whatsapp">
                        <div class="send-icon" style="background:#25D366">
                            <svg viewBox="0 0 24 24" width="28" height="28" fill="white"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
                        </div>
                        <span>WhatsApp</span>
                    </button>
                    <button class="send-option" data-action="instagram">
                        <div class="send-icon" style="background:linear-gradient(45deg,#f09433,#e6683c,#dc2743,#cc2366,#bc1888)">
                            <svg viewBox="0 0 24 24" width="28" height="28" fill="white"><path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zm0-2.163c-3.259 0-3.667.014-4.947.072-4.358.2-6.78 2.618-6.98 6.98-.059 1.281-.073 1.689-.073 4.948 0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98 1.281.058 1.689.072 4.948.072 3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98-1.281-.059-1.69-.073-4.949-.073zm0 5.838c-3.403 0-6.162 2.759-6.162 6.162s2.759 6.163 6.162 6.163 6.162-2.759 6.162-6.163c0-3.403-2.759-6.162-6.162-6.162zm0 10.162c-2.209 0-4-1.79-4-4 0-2.209 1.791-4 4-4s4 1.791 4 4c0 2.21-1.791 4-4 4zm6.406-11.845c-.796 0-1.441.645-1.441 1.44s.645 1.44 1.441 1.44c.795 0 1.439-.645 1.439-1.44s-.644-1.44-1.439-1.44z"/></svg>
                        </div>
                        <span>Instagram</span>
                    </button>
                    <button class="send-option" data-action="email">
                        <div class="send-icon" style="background:#4A90D9">
                            <svg viewBox="0 0 24 24" width="28" height="28" fill="none" stroke="white" stroke-width="2" stroke-linecap="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
                        </div>
                        <span>Email</span>
                    </button>
                    <button class="send-option" data-action="copy">
                        <div class="send-icon" style="background:#6B7280">
                            <svg viewBox="0 0 24 24" width="28" height="28" fill="none" stroke="white" stroke-width="2" stroke-linecap="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>
                        </div>
                        <span>Copiar</span>
                    </button>
                    <button class="send-option" data-action="more">
                        <div class="send-icon" style="background:#8B5CF6">
                            <svg viewBox="0 0 24 24" width="28" height="28" fill="none" stroke="white" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="1"/><circle cx="19" cy="12" r="1"/><circle cx="5" cy="12" r="1"/></svg>
                        </div>
                        <span>Mas</span>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
