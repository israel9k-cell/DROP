<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#1a0a00">
    <title>TimeLens - Camara del Pasado</title>
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon-192.png">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Splash Screen -->
    <div id="splash" class="splash">
        <div class="splash-content">
            <div class="lens-icon">
                <svg viewBox="0 0 120 120" width="120" height="120">
                    <circle cx="60" cy="60" r="55" fill="none" stroke="#c8a050" stroke-width="3"/>
                    <circle cx="60" cy="60" r="38" fill="none" stroke="#c8a050" stroke-width="2" opacity="0.6"/>
                    <circle cx="60" cy="60" r="22" fill="#c8a05020" stroke="#c8a050" stroke-width="1.5"/>
                    <circle cx="60" cy="60" r="8" fill="#c8a050" opacity="0.4"/>
                    <line x1="60" y1="2" x2="60" y2="18" stroke="#c8a050" stroke-width="1.5" opacity="0.4"/>
                    <line x1="60" y1="102" x2="60" y2="118" stroke="#c8a050" stroke-width="1.5" opacity="0.4"/>
                    <line x1="2" y1="60" x2="18" y2="60" stroke="#c8a050" stroke-width="1.5" opacity="0.4"/>
                    <line x1="102" y1="60" x2="118" y2="60" stroke="#c8a050" stroke-width="1.5" opacity="0.4"/>
                </svg>
            </div>
            <h1>TimeLens</h1>
            <p>Camara del Pasado</p>
            <div class="loading-bar"><div class="loading-fill"></div></div>
        </div>
    </div>

    <!-- Main App -->
    <div id="app" class="app hidden">

        <!-- ===== CAMERA VIEW ===== -->
        <div id="camera-view" class="camera-view">
            <video id="camera-feed" autoplay playsinline muted></video>
            <canvas id="preview-canvas" class="hidden"></canvas>

            <!-- Top Bar -->
            <div class="top-bar">
                <button id="btn-flash" class="top-icon-btn" title="Flash">
                    <svg viewBox="0 0 24 24" width="28" height="28" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
                        <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/>
                    </svg>
                </button>
                <button id="btn-era" class="era-btn">
                    <span id="era-label">1920s</span>
                    <svg viewBox="0 0 12 12" width="10" height="10" fill="currentColor"><path d="M2 4l4 5 4-5z"/></svg>
                </button>
                <button id="btn-switch-cam" class="top-icon-btn" title="Cambiar camara">
                    <svg viewBox="0 0 24 24" width="28" height="28" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
                        <path d="M23 19a2 2 0 01-2 2H3a2 2 0 01-2-2V8a2 2 0 012-2h4l2-3h6l2 3h4a2 2 0 012 2z"/>
                        <circle cx="12" cy="13" r="4"/>
                    </svg>
                </button>
            </div>

            <!-- Era Picker Dropdown -->
            <div id="era-picker" class="era-picker hidden">
                <div class="era-option selected" data-era="1850">
                    <div class="era-icon-wrap"><span>&#x1F3A9;</span></div>
                    <div class="era-info">
                        <div class="era-name">1850s</div>
                        <div class="era-desc">Daguerrotipo</div>
                    </div>
                </div>
                <div class="era-option" data-era="1900">
                    <div class="era-icon-wrap"><span>&#x1F682;</span></div>
                    <div class="era-info">
                        <div class="era-name">1900s</div>
                        <div class="era-desc">Sepia clasico</div>
                    </div>
                </div>
                <div class="era-option" data-era="1920">
                    <div class="era-icon-wrap"><span>&#x1F3AD;</span></div>
                    <div class="era-info">
                        <div class="era-name">1920s</div>
                        <div class="era-desc">Cine mudo</div>
                    </div>
                </div>
                <div class="era-option" data-era="1950">
                    <div class="era-icon-wrap"><span>&#x1F697;</span></div>
                    <div class="era-info">
                        <div class="era-name">1950s</div>
                        <div class="era-desc">Blanco y negro</div>
                    </div>
                </div>
                <div class="era-option" data-era="1970">
                    <div class="era-icon-wrap"><span>&#x270C;&#xFE0F;</span></div>
                    <div class="era-info">
                        <div class="era-name">1970s</div>
                        <div class="era-desc">Polaroid retro</div>
                    </div>
                </div>
                <div class="era-option" data-era="1990">
                    <div class="era-icon-wrap"><span>&#x1F4FC;</span></div>
                    <div class="era-info">
                        <div class="era-name">1990s</div>
                        <div class="era-desc">Camara desechable</div>
                    </div>
                </div>
            </div>

            <!-- Bottom Controls -->
            <div class="bottom-bar">
                <button id="btn-gallery" class="bottom-action" title="Galeria">
                    <div id="gallery-thumb" class="gallery-thumb-img"></div>
                    <svg class="gallery-placeholder" viewBox="0 0 24 24" width="30" height="30" fill="none" stroke="currentColor" stroke-width="1.5">
                        <rect x="3" y="3" width="18" height="18" rx="2"/>
                        <circle cx="8.5" cy="8.5" r="1.5"/>
                        <path d="M21 15l-5-5L5 21"/>
                    </svg>
                    <span class="bottom-label">Galeria</span>
                </button>

                <button id="btn-capture" class="capture-btn">
                    <div class="capture-ring">
                        <div class="capture-inner"></div>
                    </div>
                </button>

                <button id="btn-upload" class="bottom-action" title="Enviar foto">
                    <svg viewBox="0 0 24 24" width="30" height="30" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
                        <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/>
                        <polyline points="17 8 12 3 7 8"/>
                        <line x1="12" y1="3" x2="12" y2="15"/>
                    </svg>
                    <span class="bottom-label">Enviar</span>
                </button>
                <input type="file" id="file-input" accept="image/*" class="hidden">
            </div>
        </div>

        <!-- ===== RESULT VIEW ===== -->
        <div id="result-view" class="result-view hidden">
            <div class="result-header">
                <button id="btn-back" class="header-btn">
                    <svg viewBox="0 0 24 24" width="26" height="26" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
                </button>
                <span class="result-title">Foto del Pasado</span>
                <button id="btn-save" class="header-btn">
                    <svg viewBox="0 0 24 24" width="26" height="26" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
                        <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/>
                        <polyline points="7 10 12 15 17 10"/>
                        <line x1="12" y1="15" x2="12" y2="3"/>
                    </svg>
                </button>
            </div>
            <div class="result-container">
                <canvas id="result-canvas"></canvas>
                <div id="date-stamp" class="date-stamp"></div>
            </div>
            <div class="result-actions">
                <button id="btn-edit-nano" class="action-btn banana">
                    <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
                        <path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 013 3L7 19l-4 1 1-4L16.5 3.5z"/>
                    </svg>
                    <span>Editar</span>
                </button>
                <button id="btn-share" class="action-btn primary">
                    <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
                        <circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/>
                        <line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/>
                        <line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/>
                    </svg>
                    <span>Compartir</span>
                </button>
                <button id="btn-send-edit" class="action-btn accent">
                    <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
                        <line x1="22" y1="2" x2="11" y2="13"/>
                        <polygon points="22 2 15 22 11 13 2 9 22 2"/>
                    </svg>
                    <span>Enviar</span>
                </button>
                <button id="btn-retake" class="action-btn secondary">
                    <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
                        <path d="M23 19a2 2 0 01-2 2H3a2 2 0 01-2-2V8a2 2 0 012-2h4l2-3h6l2 3h4a2 2 0 012 2z"/>
                        <circle cx="12" cy="13" r="4"/>
                    </svg>
                    <span>Nueva</span>
                </button>
            </div>
        </div>

        <!-- ===== NANO BANANA EDITOR ===== -->
        <div id="editor-view" class="editor-view hidden">
            <div class="editor-header">
                <button id="btn-editor-cancel" class="header-btn">
                    <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                </button>
                <div class="editor-brand">
                    <span class="banana-icon">&#x1F34C;</span>
                    <span class="editor-brand-text">Nano Banana</span>
                </div>
                <button id="btn-editor-done" class="header-btn done-btn">
                    <svg viewBox="0 0 24 24" width="26" height="26" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round"><polyline points="20 6 9 17 4 12"/></svg>
                </button>
            </div>

            <!-- Editor Canvas Area -->
            <div class="editor-canvas-wrap">
                <canvas id="editor-canvas"></canvas>
                <canvas id="draw-canvas"></canvas>
            </div>

            <!-- Tool Panels -->
            <div id="panel-adjust" class="tool-panel hidden">
                <div class="slider-group">
                    <label>
                        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
                        <span>Brillo</span>
                    </label>
                    <input type="range" id="slider-brightness" min="-100" max="100" value="0">
                    <span id="val-brightness" class="slider-val">0</span>
                </div>
                <div class="slider-group">
                    <label>
                        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 2a10 10 0 010 20z" fill="currentColor" opacity="0.3"/></svg>
                        <span>Contraste</span>
                    </label>
                    <input type="range" id="slider-contrast" min="-100" max="100" value="0">
                    <span id="val-contrast" class="slider-val">0</span>
                </div>
                <div class="slider-group">
                    <label>
                        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2.69l5.66 5.66a8 8 0 11-11.31 0z"/></svg>
                        <span>Saturacion</span>
                    </label>
                    <input type="range" id="slider-saturation" min="-100" max="100" value="0">
                    <span id="val-saturation" class="slider-val">0</span>
                </div>
            </div>

            <div id="panel-draw" class="tool-panel hidden">
                <div class="draw-colors">
                    <button class="color-dot active" data-color="#FFFFFF" style="background:#FFF"></button>
                    <button class="color-dot" data-color="#FF3B30" style="background:#FF3B30"></button>
                    <button class="color-dot" data-color="#FF9500" style="background:#FF9500"></button>
                    <button class="color-dot" data-color="#FFCC00" style="background:#FFCC00"></button>
                    <button class="color-dot" data-color="#34C759" style="background:#34C759"></button>
                    <button class="color-dot" data-color="#007AFF" style="background:#007AFF"></button>
                    <button class="color-dot" data-color="#AF52DE" style="background:#AF52DE"></button>
                    <button class="color-dot" data-color="#000000" style="background:#000;border:2px solid #555"></button>
                </div>
                <div class="draw-sizes">
                    <button class="size-dot active" data-size="3"><div style="width:6px;height:6px"></div></button>
                    <button class="size-dot" data-size="6"><div style="width:10px;height:10px"></div></button>
                    <button class="size-dot" data-size="12"><div style="width:16px;height:16px"></div></button>
                    <button class="size-dot" data-size="24"><div style="width:24px;height:24px"></div></button>
                </div>
                <button id="btn-draw-undo" class="draw-action-btn">
                    <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 105.64-8.37L1 10"/></svg>
                    Deshacer
                </button>
            </div>

            <div id="panel-text" class="tool-panel hidden">
                <input type="text" id="text-input" class="text-editor-input" placeholder="Escribe tu texto..." maxlength="100">
                <div class="draw-colors text-colors">
                    <button class="color-dot active" data-tcolor="#FFFFFF" style="background:#FFF"></button>
                    <button class="color-dot" data-tcolor="#FF3B30" style="background:#FF3B30"></button>
                    <button class="color-dot" data-tcolor="#FFCC00" style="background:#FFCC00"></button>
                    <button class="color-dot" data-tcolor="#34C759" style="background:#34C759"></button>
                    <button class="color-dot" data-tcolor="#007AFF" style="background:#007AFF"></button>
                    <button class="color-dot" data-tcolor="#000000" style="background:#000;border:2px solid #555"></button>
                </div>
                <div class="text-size-row">
                    <span>Tamano</span>
                    <input type="range" id="slider-text-size" min="16" max="80" value="32">
                </div>
                <button id="btn-place-text" class="draw-action-btn accent-btn">Colocar texto</button>
            </div>

            <div id="panel-sticker" class="tool-panel hidden">
                <div class="sticker-grid">
                    <button class="sticker-btn" data-sticker="&#x1F34C;">&#x1F34C;</button>
                    <button class="sticker-btn" data-sticker="&#x2B50;">&#x2B50;</button>
                    <button class="sticker-btn" data-sticker="&#x2764;&#xFE0F;">&#x2764;&#xFE0F;</button>
                    <button class="sticker-btn" data-sticker="&#x1F525;">&#x1F525;</button>
                    <button class="sticker-btn" data-sticker="&#x1F60E;">&#x1F60E;</button>
                    <button class="sticker-btn" data-sticker="&#x1F47B;">&#x1F47B;</button>
                    <button class="sticker-btn" data-sticker="&#x1F451;">&#x1F451;</button>
                    <button class="sticker-btn" data-sticker="&#x1F308;">&#x1F308;</button>
                    <button class="sticker-btn" data-sticker="&#x1F3B6;">&#x1F3B6;</button>
                    <button class="sticker-btn" data-sticker="&#x1F4A5;">&#x1F4A5;</button>
                    <button class="sticker-btn" data-sticker="&#x1F389;">&#x1F389;</button>
                    <button class="sticker-btn" data-sticker="&#x1F480;">&#x1F480;</button>
                    <button class="sticker-btn" data-sticker="&#x1F984;">&#x1F984;</button>
                    <button class="sticker-btn" data-sticker="&#x1F47D;">&#x1F47D;</button>
                    <button class="sticker-btn" data-sticker="&#x1F95D;">&#x1F95D;</button>
                    <button class="sticker-btn" data-sticker="&#x1F30A;">&#x1F30A;</button>
                </div>
            </div>

            <div id="panel-rotate" class="tool-panel hidden">
                <div class="rotate-actions">
                    <button id="btn-rotate-left" class="rotate-btn">
                        <svg viewBox="0 0 24 24" width="28" height="28" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 105.64-8.37L1 10"/></svg>
                        <span>90 izq</span>
                    </button>
                    <button id="btn-rotate-right" class="rotate-btn">
                        <svg viewBox="0 0 24 24" width="28" height="28" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 11-5.64-8.37L23 10"/></svg>
                        <span>90 der</span>
                    </button>
                    <button id="btn-flip-h" class="rotate-btn">
                        <svg viewBox="0 0 24 24" width="28" height="28" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="17 1 21 5 17 9"/><path d="M3 5h18"/><polyline points="7 15 3 19 7 23"/><path d="M21 19H3"/></svg>
                        <span>Voltear H</span>
                    </button>
                    <button id="btn-flip-v" class="rotate-btn">
                        <svg viewBox="0 0 24 24" width="28" height="28" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="1 7 5 3 9 7"/><path d="M5 3v18"/><polyline points="15 17 19 21 23 17"/><path d="M19 21V3"/></svg>
                        <span>Voltear V</span>
                    </button>
                </div>
            </div>

            <!-- Editor Toolbar -->
            <div class="editor-toolbar">
                <button class="tool-btn active" data-tool="adjust">
                    <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
                        <line x1="4" y1="21" x2="4" y2="14"/><line x1="4" y1="10" x2="4" y2="3"/><line x1="12" y1="21" x2="12" y2="12"/><line x1="12" y1="8" x2="12" y2="3"/><line x1="20" y1="21" x2="20" y2="16"/><line x1="20" y1="12" x2="20" y2="3"/>
                        <line x1="1" y1="14" x2="7" y2="14"/><line x1="9" y1="8" x2="15" y2="8"/><line x1="17" y1="16" x2="23" y2="16"/>
                    </svg>
                    <span>Ajustes</span>
                </button>
                <button class="tool-btn" data-tool="draw">
                    <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
                        <path d="M12 19l7-7 3 3-7 7-3-3z"/><path d="M18 13l-1.5-7.5L2 2l3.5 14.5L13 18l5-5z"/><path d="M2 2l7.586 7.586"/>
                        <circle cx="11" cy="11" r="2"/>
                    </svg>
                    <span>Dibujar</span>
                </button>
                <button class="tool-btn" data-tool="text">
                    <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
                        <polyline points="4 7 4 4 20 4 20 7"/><line x1="9.5" y1="20" x2="14.5" y2="20"/><line x1="12" y1="4" x2="12" y2="20"/>
                    </svg>
                    <span>Texto</span>
                </button>
                <button class="tool-btn" data-tool="sticker">
                    <span style="font-size:24px">&#x1F34C;</span>
                    <span>Stickers</span>
                </button>
                <button class="tool-btn" data-tool="rotate">
                    <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
                        <polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 11-5.64-8.37L23 10"/>
                    </svg>
                    <span>Rotar</span>
                </button>
            </div>
        </div>

        <!-- ===== GALLERY VIEW ===== -->
        <div id="gallery-view" class="gallery-view hidden">
            <div class="gallery-header">
                <button id="btn-gallery-back" class="header-btn">
                    <svg viewBox="0 0 24 24" width="26" height="26" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
                </button>
                <span class="gallery-title">Mi Coleccion</span>
                <button id="btn-clear-gallery" class="header-btn">
                    <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
                        <polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/>
                    </svg>
                </button>
            </div>
            <div id="gallery-grid" class="gallery-grid"></div>
            <div id="gallery-empty" class="gallery-empty hidden">
                <svg viewBox="0 0 24 24" width="64" height="64" fill="none" stroke="currentColor" stroke-width="1" opacity="0.35" stroke-linecap="round">
                    <path d="M23 19a2 2 0 01-2 2H3a2 2 0 01-2-2V8a2 2 0 012-2h4l2-3h6l2 3h4a2 2 0 012 2z"/>
                    <circle cx="12" cy="13" r="4"/>
                </svg>
                <p>Aun no has tomado fotos</p>
            </div>
        </div>

        <!-- ===== SEND MODAL ===== -->
        <div id="send-modal" class="modal-overlay hidden">
            <div class="modal-card">
                <div class="modal-header">
                    <span class="modal-title">Enviar foto</span>
                    <button id="btn-close-modal" class="modal-close">
                        <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                    </button>
                </div>
                <div class="send-options">
                    <button class="send-option" data-action="whatsapp">
                        <div class="send-icon" style="background:#25D366">
