<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#09090b">
    <title>Sweet Glam - Calculadora de Precios</title>
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon-192.png">
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<!-- Header -->
<header class="header">
    <div class="container header-inner">
        <div>
            <h1 class="brand">Sweet Glam</h1>
            <p class="brand-sub">Calculadora de Precios</p>
        </div>
        <div class="tasa-wrap">
            <div class="tasa-label">Tasa</div>
            <div class="tasa-val" id="tasa-header">$0</div>
        </div>
    </div>
</header>

<!-- Content -->
<main class="container content">

    <!-- ======= TAB CALCULADORA ======= -->
    <section class="tab-content" data-tab="calc">

        <div class="card">
            <h2 class="card-title">
                <svg class="ico" viewBox="0 0 24 24"><path d="M16.5 9.4 7.55 4.24M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16zM3.27 6.96 12 12.01l8.73-5.05M12 22.08V12"/></svg>
                Datos del producto
            </h2>
            <div class="stack">
                <div class="field">
                    <label><svg class="ico-sm" viewBox="0 0 24 24"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg> Costo USD</label>
                    <input type="number" inputmode="decimal" step="0.01" placeholder="150.00" data-bind="costoUsd" class="input input-lg">
                </div>
                <div class="field">
                    <label><svg class="ico-sm" viewBox="0 0 24 24"><path d="M20.59 13.41 13.42 20.58a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"/><line x1="7" y1="7" x2="7.01" y2="7"/></svg> Categoría</label>
                    <select data-bind="categoria" id="sel-categoria" class="input"></select>
                </div>
                <div class="field">
                    <label>Marca</label>
                    <input type="text" list="marcas-list" placeholder="Golden Goose, Nike..." data-bind="marca" class="input">
                    <datalist id="marcas-list"></datalist>
                </div>
                <div class="field">
                    <label>Descripción (opcional)</label>
                    <input type="text" placeholder="Super Star blancas talla 39" data-bind="descripcion" class="input">
                </div>
            </div>
        </div>

        <div class="card">
            <h2 class="card-title">Parámetros de cálculo</h2>
            <div class="grid-2">
                <div class="field">
                    <label>Tax Florida %</label>
                    <input type="number" inputmode="decimal" step="0.1" data-bind="taxLocal" class="input">
                </div>
                <div class="field">
                    <label>Tasa COP/USD</label>
                    <input type="number" inputmode="numeric" data-bind="tasaLocal" class="input">
                </div>
            </div>
            <p class="hint">Aquí puedes cambiarlo solo para este cálculo. Para cambiarlo permanente ve a Ajustes.</p>
        </div>

        <div class="card">
            <h2 class="card-title">Margen a aplicar</h2>
            <div class="seg">
                <button class="seg-btn active" data-action="set-tipo-margen" data-val="fijo">Fijo en COP</button>
                <button class="seg-btn" data-action="set-tipo-margen" data-val="pct">Porcentaje %</button>
            </div>
            <div class="field">
                <label id="lbl-margen">Cuánto agregas en COP</label>
                <input type="number" inputmode="decimal" placeholder="200000" data-bind="valorMargen" class="input input-lg" id="inp-margen">
            </div>
            <p class="hint" id="hint-margen"></p>
        </div>

        <div class="card card-hi">
            <h2 class="card-title">Desglose del precio</h2>
            <div class="desglose" id="desglose"></div>
            <div class="final">
                <div class="final-label">PRECIO FINAL</div>
                <div class="final-val" id="precio-final">$0</div>
                <div class="final-row">
                    <span class="muted">Ganancia</span>
                    <span class="positivo" id="ganancia">$0</span>
                </div>
            </div>
            <button class="btn btn-primary btn-full" data-action="guardar" id="btn-guardar" disabled>
                Guardar en historial
            </button>
        </div>

    </section>

    <!-- ======= TAB HISTORIAL ======= -->
    <section class="tab-content hidden" data-tab="hist">
        <div class="row">
            <button class="btn btn-secondary" data-action="exportar-csv">
                <svg class="ico-sm" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                Exportar CSV
            </button>
            <button class="btn btn-danger btn-icon" data-action="limpiar-historial">
                <svg class="ico-sm" viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
            </button>
        </div>
        <div class="chips" id="hist-chips"></div>
        <div id="hist-lista"></div>
    </section>

    <!-- ======= TAB ANÁLISIS ======= -->
    <section class="tab-content hidden" data-tab="ana">
        <div id="ana-contenido"></div>
    </section>

    <!-- ======= TAB CONFIGURACIÓN ======= -->
    <section class="tab-content hidden" data-tab="cfg">

        <div class="card">
            <h2 class="card-title">Parámetros globales</h2>
            <div class="stack">
                <div class="field">
                    <label>Tax Florida (%)</label>
                    <input type="number" inputmode="decimal" step="0.1" data-bind="cfgTaxPct" class="input">
                </div>
                <div class="field">
                    <label>Tasa del dólar (COP por 1 USD)</label>
                    <input type="number" inputmode="numeric" data-bind="cfgTasaDolar" class="input">
                </div>
                <button class="btn btn-primary btn-full" data-action="guardar-generales">Guardar cambios</button>
            </div>
        </div>

        <div class="card">
            <h2 class="card-title" id="cfg-cat-titulo">Categorías</h2>
            <div class="lista" id="cfg-categorias"></div>
            <div class="row">
                <input type="text" placeholder="Nueva categoría" data-bind="nuevaCat" class="input" id="inp-nueva-cat">
                <button class="btn btn-primary btn-icon" data-action="agregar-categoria">
                    <svg class="ico-sm" viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                </button>
            </div>
        </div>

        <div class="card">
            <h2 class="card-title" id="cfg-marcas-titulo">Marcas</h2>
            <div class="lista lista-scroll" id="cfg-marcas"></div>
            <div class="row">
                <input type="text" placeholder="Nueva marca" data-bind="nuevaMarca" class="input" id="inp-nueva-marca">
                <button class="btn btn-primary btn-icon" data-action="agregar-marca">
                    <svg class="ico-sm" viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                </button>
            </div>
        </div>

    </section>

</main>

<!-- Toast -->
<div id="toast" class="toast hidden"></div>

<!-- Bottom Nav -->
<nav class="bottom-nav">
    <div class="container nav-inner">
        <button class="nav-btn active" data-action="set-tab" data-val="calc">
            <svg class="ico" viewBox="0 0 24 24"><rect x="4" y="2" width="16" height="20" rx="2"/><line x1="8" y1="6" x2="16" y2="6"/><line x1="8" y1="10" x2="16" y2="10"/><line x1="8" y1="14" x2="8.01" y2="14"/><line x1="12" y1="14" x2="12.01" y2="14"/><line x1="16" y1="14" x2="16.01" y2="14"/><line x1="8" y1="18" x2="8.01" y2="18"/><line x1="12" y1="18" x2="12.01" y2="18"/><line x1="16" y1="18" x2="16.01" y2="18"/></svg>
            <span>Calcular</span>
        </button>
        <button class="nav-btn" data-action="set-tab" data-val="hist">
            <svg class="ico" viewBox="0 0 24 24"><path d="M3 3v5h5"/><path d="M3.05 13A9 9 0 1 0 6 5.3L3 8"/><polyline points="12 7 12 12 15 15"/></svg>
            <span>Historial</span>
            <span class="badge hidden" id="nav-badge">0</span>
        </button>
        <button class="nav-btn" data-action="set-tab" data-val="ana">
            <svg class="ico" viewBox="0 0 24 24"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/></svg>
            <span>Análisis</span>
        </button>
        <button class="nav-btn" data-action="set-tab" data-val="cfg">
            <svg class="ico" viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
            <span>Ajustes</span>
        </button>
    </div>
</nav>

<script src="app.js"></script>
<script>
if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js').catch(() => {});
}
</script>
</body>
</html>
